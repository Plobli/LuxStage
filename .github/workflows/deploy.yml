name: Deploy to Raspberry Pi

on:
  workflow_dispatch:
    inputs:
      skip_build:
        description: 'Web-App Build überspringen (nur Server-Neustart)'
        type: boolean
        default: false

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web-app/package-lock.json

      - name: Tailscale verbinden
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Web-App bauen
        if: ${{ !inputs.skip_build }}
        run: |
          cd web-app
          npm ci
          npm run build

      - name: Server-Abhängigkeiten installieren
        run: cd server && npm ci --omit=dev

      - name: Dateien auf Pi kopieren
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PI_HOST }}
          username: ${{ secrets.PI_USER }}
          key: ${{ secrets.PI_SSH_KEY }}
          source: "server,shared,web-app/dist"
          target: ~/LuxStage/
          rm: true

      - name: PM2 neu starten
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PI_HOST }}
          username: ${{ secrets.PI_USER }}
          key: ${{ secrets.PI_SSH_KEY }}
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && source "$NVM_DIR/nvm.sh"
            pm2 restart luxstage
            pm2 list
