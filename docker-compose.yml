services:
  luxstage:
    build: .
    restart: unless-stopped
    ports:
      - 3030:3000
    volumes:
      - luxstage-data:/app/data
    environment:
      NODE_ENV: production
      PORT: 3000
      # Pflicht: mindestens 32 zufällige Zeichen, z. B.: openssl rand -hex 32
      JWT_SECRET: ${JWT_SECRET}
      DATA_PATH: /app/data
      # Kommasepariert: http://luxstage.local,http://192.168.1.100,https://example.com
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      # Optional: ANTHROPIC_API_KEY für KI-Features
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "require('http').get('http://localhost:3000/api/health', r =>
          process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () =>
          process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
volumes:
  luxstage-data: null
networks: {}
